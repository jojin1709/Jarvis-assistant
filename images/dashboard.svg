  <text x="334" y="143" fill="#E6EDF3" font-family="Inter, Arial" font-size="24" font-weight="800">Command Center</text>
  <rect x="876" y="104" width="80" height="34" rx="14" fill="#fff" opacity=".04" stroke="#fff" stroke-opacity=".08"/>
