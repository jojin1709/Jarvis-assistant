  <text x="334" y="563" fill="#94A3B8" font-family="Inter, Arial" font-size="14">Ask Jarvis to open apps, automate browser, generate code, or analyze the screen...</text>
  <rect x="1000" y="548" width="82" height="44" rx="16" fill="url(#cyan)"/>
  <text x="1024" y="576" fill="#07101E" font-family="Inter, Arial" font-size="14" font-weight="800">Run</text>
