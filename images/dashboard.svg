  <path d="M416 352c22-50 58-77 107-77 68 0 111 48 111 108 0 37-14 66-42 88" fill="none" stroke="#00E5FF" stroke-opacity=".36" stroke-width="18" stroke-linecap="round"/>
  <circle cx="556" cy="346" r="70" fill="#00E5FF" opacity=".08"/>
  <circle cx="556" cy="346" r="42" fill="url(#cyan)"/>
