<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="JX Jarvis dashboard interface">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#070B14"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00E5FF"/>
      <stop offset="1" stop-color="#5EEAD4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity=".45"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <circle cx="915" cy="90" r="260" fill="#00E5FF" opacity=".08"/>
  <circle cx="220" cy="680" r="300" fill="#64748B" opacity=".08"/>
  <rect x="52" y="48" width="1096" height="664" rx="34" fill="#0F172A" opacity=".74" stroke="#fff" stroke-opacity=".08" filter="url(#shadow)"/>
  <rect x="84" y="82" width="190" height="596" rx="26" fill="#07101E" stroke="#fff" stroke-opacity=".06"/>
  <rect x="112" y="118" width="54" height="54" rx="18" fill="#0B1020" stroke="#fff" stroke-opacity=".1"/>
