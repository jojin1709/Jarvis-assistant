    <rect x="858" y="254" width="220" height="44" rx="14" fill="#fff" opacity=".045"/>
    <text x="876" y="281" fill="#E6EDF3">Understanding request</text>
    <rect x="858" y="310" width="220" height="44" rx="14" fill="#fff" opacity=".045"/>
    <text x="876" y="337" fill="#E6EDF3">Planning workflow</text>
    <rect x="858" y="366" width="220" height="44" rx="14" fill="#00E5FF" opacity=".09"/>
